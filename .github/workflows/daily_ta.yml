name: Daily TA Report

on:
  schedule:
    # 4:00 PM Taiwan time (CST) = 08:00 UTC
    - cron: "00 08 * * 1-5"

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      portfolio:
        description: "Override tickers (comma-separated, e.g. AAPL,TSLA). Leave blank to use portfolio.xlsx"
        required: false
        default: ""

jobs:
  ta-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TA analysis
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PORTFOLIO_OVERRIDE: ${{ inputs.portfolio }}
        run: python scripts/analyze.py
